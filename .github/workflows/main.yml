name: Build Jesee Store APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Webview to APK
        uses: swayangjit/webview-to-app-action@v1.1
        with:
          app-name: "Jesee Store"
          url: "https://jesee.store/"
